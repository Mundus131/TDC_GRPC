services:
  tdc-grpc-backend:
    image: ghcr.io/${GHCR_OWNER}/tdc_grpc/tdc-grpc-backend:${IMAGE_TAG:-latest}
    container_name: tdc-grpc-backend
    restart: unless-stopped
    environment:
      PORT: 5010
      TDC_GRPC_HOST: ${TDC_GRPC_HOST:-192.168.0.100}
      TDC_GRPC_PORT: ${TDC_GRPC_PORT:-8081}
      TDC_AUTH_LOGIN_URL: ${TDC_AUTH_LOGIN_URL:-http://192.168.0.100/auth/login}
      TDC_AUTH_USERNAME: ${TDC_AUTH_USERNAME:-admin}
      TDC_AUTH_PASSWORD: ${TDC_AUTH_PASSWORD:?Set TDC_AUTH_PASSWORD}
      TDC_AUTH_REALM: ${TDC_AUTH_REALM:-admin}
      TZ: ${TZ:-Europe/Warsaw}
    ports:
      - "${BACKEND_PORT:-5010}:5010"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "const net=require('net');const s=net.connect(5010,'127.0.0.1',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000);"
      interval: 15s
      timeout: 5s
      retries: 8
    networks:
      - tdc-grpc-net

  tdc-grpc-frontend:
    image: ghcr.io/${GHCR_OWNER}/tdc_grpc/tdc-grpc-frontend:${IMAGE_TAG:-latest}
    container_name: tdc-grpc-frontend
    restart: unless-stopped
    depends_on:
      tdc-grpc-backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5000}:80"
    networks:
      - tdc-grpc-net

  tdc-grpc-remote-command-channel:
    image: ghcr.io/${GHCR_OWNER}/tdc_grpc/tdc-grpc-remote-command-channel:${IMAGE_TAG:-latest}
    container_name: tdc-grpc-remote-command-channel
    restart: unless-stopped
    user: "0:0"
    depends_on:
      tdc-grpc-backend:
        condition: service_healthy
    ports:
      - "${RCC_PORT:-5555}:5555"
    devices:
      - "${SERIAL_DEVICE_PATH:-/dev/ttyUSB0}:/dev/ttyUSB0"
    environment:
      PORT: 5555
      TZ: ${TZ:-Europe/Warsaw}
    networks:
      - tdc-grpc-net

networks:
  tdc-grpc-net:
    driver: bridge
