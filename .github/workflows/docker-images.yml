name: Build ARM64 Docker Images

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/mundus131/tdc_grpc
  PLATFORMS: linux/arm64/v8

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: tdc-grpc-backend
            context: backend
            dockerfile: backend/Dockerfile
          - image: tdc-grpc-frontend
            context: frontend
            dockerfile: frontend/Dockerfile
          - image: tdc-grpc-remote-command-channel
            context: remoteCommandChannel
            dockerfile: remoteCommandChannel/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        shell: bash
        run: |
          set -eu
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${GITHUB_REF_NAME//\//-}"
          fi

          TAGS="${REGISTRY_IMAGE}/${{ matrix.image }}:${VERSION}-arm64"
          TAGS="${TAGS},${REGISTRY_IMAGE}/${{ matrix.image }}:${GITHUB_SHA::7}-arm64"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS="${TAGS},${REGISTRY_IMAGE}/${{ matrix.image }}:latest-arm64"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
